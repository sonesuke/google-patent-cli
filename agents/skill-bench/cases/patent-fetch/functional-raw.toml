# Test Case: Patent Fetch - Raw HTML

name = "raw-html-fetch"
description = "Verify patent-fetch skill works with raw HTML mode"
timeout = 120

test_prompt = """
Fetch raw HTML for patent US9152718B2.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh patent-fetch"

[[checks]]
name = "patent_fetch_skill_invoked"
type = "script"
command = "check-skill-invoked.sh patent-fetch"

[[checks]]
name = "fetch_patent_mcp_called"
type = "script"
command = "check-mcp-success.sh fetch_patent"

[[checks]]
name = "raw_parameter_used"
type = "script"
command = "check-param.sh \"\" fetch_patent raw true"
