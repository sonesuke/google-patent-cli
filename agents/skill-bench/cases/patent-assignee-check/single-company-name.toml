# Test Case: Patent Assignee Check - Single Company Name

name = "single-company-name"
description = "Verify patent-assignee-check correctly handles single company name (should pass as array)"
timeout = 120

test_prompt = """
Check assignee variations for "Apple" in patent databases.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh patent-assignee-check"

[[checks]]
name = "patent_assignee_check_skill_invoked"
type = "script"
command = "check-skill-invoked.sh patent-assignee-check"

[[checks]]
name = "search_patents_mcp_called"
type = "script"
command = "check-mcp-success.sh search_patents"

[[checks]]
name = "assignee_param_exists"
type = "script"
command = "check-param.sh search_patents assignee"

[[checks]]
name = "assignee_is_array"
type = "script"
command = "check-assignee-is-array.sh"
