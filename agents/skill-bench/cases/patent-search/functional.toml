# Test Case: Patent Search - Basic Query

name = "basic-search"
description = "Verify patent-search skill works with basic query"
timeout = 120

test_prompt = """
I want to search for patents about machine learning, show me 5 results.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh patent-search"

[[checks]]
name = "patent_search_skill_invoked"
type = "script"
command = "check-skill-invoked.sh patent-search"

[[checks]]
name = "search_patents_mcp_called"
type = "script"
command = "check-mcp-success.sh search_patents"
