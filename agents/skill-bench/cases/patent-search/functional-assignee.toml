# Test Case: Patent Search - Assignee Filter

name = "assignee-search"
description = "Verify patent-search skill works with assignee filter"
timeout = 120

test_prompt = """
I need to find patents assigned to Google LLC, show me 10 results.
"""

[[checks]]
name = "mcp_server_loaded"
type = "script"
command = "check-mcp-loaded.sh google-patent-cli"

[[checks]]
name = "skill_loaded"
type = "script"
command = "check-skill-loaded.sh patent-search"

[[checks]]
name = "search_patents_mcp_called"
type = "script"
command = "check-mcp-success.sh search_patents"

[[checks]]
name = "assignee_parameter_used"
type = "script"
command = "check-param.sh search_patents assignee \"Google LLC\""
