# Test Case: Patent Search - Triggering

name = "triggering"
description = "Verify patent-search skill is triggered when searching for patents"
timeout = 60

test_prompt = """
I need to search for patents about artificial intelligence.
"""

[[checks]]
name = "mcp_server_loaded"
command = { command = "mcp-loaded", server = "google-patent-cli" }

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "patent-search" }

[[checks]]
name = "patent_search_skill_invoked"
command = { command = "skill-invoked", skill = "patent-search" }
