# Test Case: Patent Search - Filing Date Filter

name = "filing-filter"
description = "Verify patent-search skill works with filing date filter"
timeout = 120

test_prompt = """
Search for patents about "ai" with filing date between 2023-01-01 and 2023-12-31, limit 5.
"""

[[checks]]
name = "mcp_server_loaded"
command = { command = "mcp-loaded", server = "google-patent-cli" }

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "patent-search" }

[[checks]]
name = "patent_search_skill_invoked"
command = { command = "skill-invoked", skill = "patent-search" }

[[checks]]
name = "search_patents_mcp_called"
command = { command = "mcp-success", tool = "search_patents" }

[[checks]]
name = "filing_after_parameter_used"
command = { command = "tool-param", tool = "search_patents", param = "filing_after", value = "2023-01-01" }

[[checks]]
name = "filing_before_parameter_used"
command = { command = "tool-param", tool = "search_patents", param = "filing_before", value = "2023-12-31" }
