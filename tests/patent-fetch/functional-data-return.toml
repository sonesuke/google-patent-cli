# Test Case: Patent Fetch - Data Return Integration

name = "integration-data-return"
description = "Verify patent-fetch skill returns data directly, not file paths"
timeout = 120

test_prompt = """
Use the patent-fetch skill to fetch patent US9152718B2.

Verify that the response includes:
- The patent title
- The abstract text
- The assignee information

The skill should return the actual patent data, not a file path that requires you to read a JSON file.
"""

[[checks]]
name = "mcp_server_loaded"
command = { command = "mcp-loaded", server = "google-patent-cli" }

[[checks]]
name = "skill_loaded"
command = { command = "skill-loaded", skill = "patent-fetch" }

[[checks]]
name = "patent_fetch_skill_invoked"
command = { command = "skill-invoked", skill = "patent-fetch" }

[[checks]]
name = "fetch_patent_mcp_called"
command = { command = "mcp-success", tool = "fetch_patent" }

[[checks]]
name = "title_returned"
command = { command = "message-contains", text = "Serving advertisements" }

[[checks]]
name = "no_json_file_path_in_output"
command = { command = "message-contains", text = 'patent-.*\.json', deny = true }
