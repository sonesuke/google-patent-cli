[tasks.build]
description = "Build dev container image with nix"
file = "scripts/build.sh"

[tasks.up]
description = "Start dev container"
file = "scripts/up.sh"

[tasks.down]
description = "Stop and remove dev container"
run = "docker stop google-patent-cli && docker rm google-patent-cli"

[tasks.attach]
description = "Attach to dev container"
run = "docker exec -it -w /workspaces/google-patent-cli google-patent-cli /bin/zsh"

[tasks.setup]
description = "Setup environment inside running container (Rust, Claude CLI, etc.)"
run = "docker exec -u 1000 google-patent-cli bash /workspaces/google-patent-cli/scripts/setup.sh"

[tasks.fmt]
description = "Check formatting with cargo fmt"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Lint with cargo clippy"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.test]
description = "Run tests with cargo test"
run = "RUSTFLAGS=\"-D warnings\" cargo test --all-targets"

[tasks.pre-commit]
description = "Run all of the above"
depends = ["fmt", "clippy", "test"]

[tasks.skill-test]
description = "Run skill-bench tests"
run = "cargo install --path . && skill-bench run tests --plugin-dir claude-plugin --log logs"

[tasks.skill-test-list]
description = "List skill-bench tests"
run = "skill-bench list tests"

[tasks.coverage]
description = "Generate test coverage report"
run = """
eval "$(cargo llvm-cov show-env --sh)"
cargo llvm-cov clean --workspace
cargo test
cargo llvm-cov report --summary-only
"""
