name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set Chrome path
        run: |
          CHROME_PATH=$(find /opt/hostedtoolcache/setup-chrome/chromium -name chrome -type f | head -1)
          echo "CHROME_BIN=$CHROME_PATH" >> $GITHUB_ENV
          echo "Found Chrome at: $CHROME_PATH"

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test
        env:
          SKIP_BROWSER_TESTS: 1

      - name: Check build
        run: cargo check --release
