name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Build and lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib --all

      - name: Check build
        run: cargo check --release

      - name: Test verbose mode
        run: |
          # Build the CLI first
          cargo build --release

          # Test verbose mode with a simple search
          ./target/release/google-patent-cli search --query "test" --limit 1 --verbose || {
            echo "Verbose mode test failed"
            exit 1
          }

          echo "Verbose mode test passed"
