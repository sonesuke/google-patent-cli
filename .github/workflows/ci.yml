name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Chrome configuration
        run: |
          # Check if Chrome exists in standard locations
          if [ -f "/usr/bin/google-chrome" ]; then
            CHROME_PATH="/usr/bin/google-chrome"
          elif [ -f "/usr/bin/chromium-browser" ]; then
            CHROME_PATH="/usr/bin/chromium-browser"
          else
            echo "ERROR: Chrome/Chromium not found"
            exit 1
          fi

          echo "Found Chrome at: $CHROME_PATH"
          $CHROME_PATH --version

          # Create config directory and set browser path
          mkdir -p ~/.config/google-patent-cli
          cat > ~/.config/google-patent-cli/config.toml << EOF
          browser_path = "$CHROME_PATH"
          EOF

          echo "Config file created:"
          cat ~/.config/google-patent-cli/config.toml

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check build
        run: cargo check --release
